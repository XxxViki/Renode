<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <style>
    text { font-family: Arial, sans-serif; font-size: 14px; }
    .box { fill: #e8f0ff; stroke: #407bff; stroke-width: 2; rx: 6; ry: 6; }
    .arrow { stroke: #6b7280; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    .label { fill: #111827; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="box" x="30" y="40" width="200" height="120" />
  <text class="label" x="130" y="75" text-anchor="middle">VSCode Tasks</text>
  <text class="label" x="130" y="100" text-anchor="middle">CMake Configure/Build</text>
  <text class="label" x="130" y="125" text-anchor="middle">scp ELF + RESC</text>

  <rect class="box" x="300" y="40" width="200" height="120" />
  <text class="label" x="400" y="75" text-anchor="middle">远端 Renode</text>
  <text class="label" x="400" y="100" text-anchor="middle">platform.resc</text>
  <text class="label" x="400" y="125" text-anchor="middle">StartGdbServer :3333</text>

  <rect class="box" x="570" y="40" width="200" height="120" />
  <text class="label" x="670" y="75" text-anchor="middle">VSCode Launch</text>
  <text class="label" x="670" y="100" text-anchor="middle">arm-none-eabi-gdb</text>
  <text class="label" x="670" y="125" text-anchor="middle">target remote 3333</text>

  <line class="arrow" x1="230" y1="100" x2="300" y2="100" />
  <line class="arrow" x1="500" y1="100" x2="570" y2="100" />

  <text class="label" x="265" y="90" text-anchor="middle">推送</text>
  <text class="label" x="535" y="90" text-anchor="middle">GDB 连接</text>
</svg>
